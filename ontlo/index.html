<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../ontlo/src/assets/ontlo_Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="google" content="notranslate" />

  <!-- Primary Meta Tags -->
  <title>Ontlo | Instant Video Connections & Real Human Interactions</title>
  <meta name="title" content="Ontlo | Instant Video Connections & Real Human Interactions" />
  <meta name="description"
    content="Stop swiping, start connecting. Ontlo is a video-first social platform for authentic real-time human interactions. Match instantly, talk via video, and form real connections." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ontlo.social/" />
  <meta property="og:title" content="Ontlo | Instant Video Connections" />
  <meta property="og:description"
    content="Authentic real-time human interactions. Match instantly and talk via video." />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://ontlo.social/" />
  <meta property="twitter:title" content="Ontlo | Instant Video Connections" />
  <meta property="twitter:description"
    content="Authentic real-time human interactions. Match instantly and talk via video." />
  <meta property="twitter:image" content="/og-image.png" />

  <!-- PWA & Mobile Optimization -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0B0E14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ontlo" />
  <link rel="apple-touch-icon" href="/src/assets/ontlo_Logo.png" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      /* Prevent elastic scrolling/bounce on mobile */
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    
    /* True Fullscreen for standalone PWA */
    @media (display-mode: standalone) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
