<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/ontlo_icon.webp" />

  <!-- Viewport -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="google" content="notranslate" />

  <!-- Primary Meta Tags -->
  <title>Ontlo | Privacy-Focused Social Media</title>

  <meta name="title" content="Ontlo | Privacy-Focused Social Media" />

  <meta name="description"
    content="Ontlo is a privacy-focused social platform built for real human connections. Experience authentic interactions, secure conversations, and meaningful social networking without compromising your privacy." />

  <meta name="keywords"
    content="Ontlo, privacy social media, secure social platform, private messaging, authentic connections, social networking, video chat, secure communication" />

  <meta name="author" content="Ontlo" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />

  <meta property="og:url" content="https://ontlo.social/" />

  <meta property="og:title"
    content="Ontlo | Privacy-Focused Social Media" />

  <meta property="og:description"
    content="A privacy-focused social platform for authentic human connections, secure conversations, and real interactions without compromising your privacy." />

  <meta property="og:image"
    content="https://ontlo.social/og-image.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />

  <meta name="twitter:url" content="https://ontlo.social/" />

  <meta name="twitter:title"
    content="Ontlo | Privacy-Focused Social Media" />

  <meta name="twitter:description"
    content="A privacy-focused social platform for authentic human connections, secure conversations, and real interactions without compromising your privacy." />

  <meta name="twitter:image"
    content="https://ontlo.social/og-image.png" />

  <!-- PWA & Mobile Optimization -->
  

  <meta name="theme-color" content="#0B0E14" />

  <meta name="mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-status-bar-style"
    content="black-translucent" />

  <meta name="apple-mobile-web-app-title" content="Ontlo" />

  <link rel="apple-touch-icon" href="/ontlo_logo.webp" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      background: #0B0E14;
    }

    @media (display-mode: standalone) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
